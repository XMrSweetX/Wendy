<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Wendy 💖</title>
    <style>
        /* CONFIGURACIÓN DEL CUERPO */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;

            /* FONDO ROSITA BONITO */
            background-color: #ffdae9; 
            
            /* PATRÓN DE CORAZONES ROJOS (ESTÁTICO) */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="red"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            background-size: 50px 50px; 
            background-repeat: repeat;
            /* Se eliminó la animación de movimiento */
        }

        /* ILUMINACIÓN ROSADA PARA LAS LETRAS */
        .greetings span {
            display: inline-block;
            font-size: 3.8rem;
            font-weight: 900;
            color: #ffffff;
            /* Efecto neón rosa potente */
            text-shadow: 
                0 0 10px #ff69b4, 
                0 0 20px #ff69b4, 
                0 0 40px #ff1493, 
                0 0 60px #ff1493;
            margin: 0 5px;
        }

        .description {
            font-size: 1.4rem;
            font-weight: bold;
            color: #b0003a; /* Rojo oscuro para que resalte sobre el rosa */
            background: rgba(255, 255, 255, 0.7); 
            padding: 8px 15px;
            border-radius: 15px;
            margin-top: 15px;
            display: inline-block;
        }

        /* BOTÓN */
        .botones {
            margin-top: 30px;
            padding: 15px 35px;
            background-color: #ff1493;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.4);
            transition: 0.3s;
        }

        .botones:hover {
            transform: scale(1.05);
            background-color: lch(68.57% 36.77 347.13);
        }

        .botones a {
            text-decoration: none;
            color: #fff;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .credits {
            position: absolute;
            bottom: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #000000;
        }
    </style>
</head>
<body>

    <div class="greetings">
        <span>Te</span>
        <span>Quiero</span>
        <span>Mucho</span>
        <span>Wendy</span>
        <span>💖</span>
    </div>

    <div class="description">
        Llegó lo que más esperabas este día 💖😊
    </div>

    <div class="button">
        <button class="botones">
            <a href="flower.html">¡Presiona acá para tener tu regalo!</a>
        </button>

    <div class="credits">
        <p>&copy; 2026 LeicaSweet C.A </p>
    </div>

</body>
</html>
